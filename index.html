<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Θεομήτωρ Bot</title>
  <style>
    :root{
      --bg1:#07130c; --bg2:#0b1d12; --card:#0f1a14cc;
      --text:#eef7f0; --muted:#b7c7bc; --accent:#9ff0b2;
      --shadow: 0 18px 60px rgba(0,0,0,.55); --radius: 18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      color:var(--text);
      background:
        radial-gradient(1200px 700px at 20% 10%, rgba(159,240,178,.18), transparent 60%),
        radial-gradient(900px 600px at 80% 15%, rgba(255,183,217,.14), transparent 55%),
        radial-gradient(1000px 700px at 50% 90%, rgba(140,210,255,.10), transparent 55%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      min-height:100vh; overflow-x:hidden;
    }

    .scene{ position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
    .trunk{ position:absolute; top:-5vh; bottom:-10vh; width:240px; opacity:.55; }
    .trunk.left{ left:-90px; transform: rotate(-2deg); }
    .trunk.right{ right:-90px; transform: scaleX(-1) rotate(-2deg); }
    .trunk::before{
      content:""; position:absolute; inset:0;
      background: repeating-linear-gradient(90deg, rgba(55,35,25,.75), rgba(55,35,25,.75) 10px, rgba(35,22,16,.75) 10px, rgba(35,22,16,.75) 20px);
      border-radius:140px; box-shadow: inset 0 0 50px rgba(0,0,0,.45);
    }
    .canopy{
      position:absolute; top:-80px; left:-60px; right:-60px; height:55%;
      background:
        radial-gradient(circle at 20% 30%, rgba(255,183,217,.55), transparent 45%),
        radial-gradient(circle at 55% 25%, rgba(255,183,217,.45), transparent 48%),
        radial-gradient(circle at 80% 35%, rgba(255,183,217,.50), transparent 46%),
        radial-gradient(circle at 35% 55%, rgba(255,210,230,.38), transparent 52%),
        radial-gradient(circle at 70% 60%, rgba(255,210,230,.30), transparent 55%);
      opacity:.9;
    }
    .petal{
      position:absolute; width:10px; height:8px;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.7), rgba(255,183,217,.95) 40%, rgba(255,120,185,.5));
      border-radius: 70% 30% 70% 30% / 60% 40% 60% 40%;
      opacity:.85; animation: fall linear infinite; filter: blur(.15px);
    }
    @keyframes fall{
      0%{ transform: translateY(-10vh) translateX(0) rotate(0deg); opacity:0; }
      10%{ opacity:.85; }
      100%{ transform: translateY(110vh) translateX(120px) rotate(380deg); opacity:0; }
    }

    .wrap{ position:relative; z-index:1; padding:32px 14px 40px; max-width:980px; margin:0 auto; }
    .header{ display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:14px; text-align:center; }
    .logo{
      width:46px;height:46px;border-radius:14px;
      background:
        radial-gradient(circle at 30% 30%, rgba(255,183,217,.95), transparent 55%),
        radial-gradient(circle at 70% 70%, rgba(159,240,178,.75), transparent 55%),
        rgba(15,26,20,.7);
      border:1px solid rgba(255,255,255,.12);
      box-shadow: var(--shadow);
    }
    h1{ margin:0; font-size: clamp(20px, 3.3vw, 30px); }
    .sub{ margin:6px 0 0; color:var(--muted); font-size:14px; }

    .card{
      background: var(--card);
      border:1px solid rgba(255,255,255,.12);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      overflow:hidden;
      backdrop-filter: blur(10px);
    }
    .topbar{
      display:flex; align-items:center; justify-content:space-between;
      gap:10px; padding:12px 14px; border-bottom:1px solid rgba(255,255,255,.08);
    }
    .hint{ font-size:13px; color:var(--muted); }
    #messages{ padding:14px; height:min(56vh, 520px); overflow-y:auto; text-align:left; white-space:pre-wrap; word-wrap:break-word; }
    .msg{ margin:10px 0; line-height:1.4; }
    .you b{ color:#8bd3ff; } .ai b{ color: var(--accent); } .err b{ color:#ff8b8b; }

    .composer{ display:flex; gap:10px; padding:12px; border-top:1px solid rgba(255,255,255,.08); background: rgba(0,0,0,.12); }
    input{
      flex:1; padding:12px; border-radius:14px; border:1px solid rgba(255,255,255,.12);
      background: rgba(10,14,12,.55); color: var(--text); outline:none; font-size:15px;
    }
    button{
      padding:12px 14px; border-radius:14px; border:1px solid rgba(255,255,255,.14);
      background: linear-gradient(135deg, rgba(159,240,178,.22), rgba(255,183,217,.18));
      color: var(--text); cursor:pointer; font-size:15px; min-width:92px;
    }
    button:disabled{ opacity:.55; cursor:not-allowed; }
    #status{ padding:10px 14px; text-align:center; font-size:13px; color:var(--muted); }
    .tools{ display:flex; gap:10px; padding: 0 14px 14px; justify-content:flex-end; }
    .smallbtn{ min-width:auto; font-size:13px; padding:8px 10px; opacity:.9; }
  </style>
</head>
<body>
  <div class="scene" aria-hidden="true">
    <div class="trunk left"><div class="canopy"></div></div>
    <div class="trunk right"><div class="canopy"></div></div>
  </div>

  <div class="wrap">
    <div class="header">
      <div class="logo"></div>
      <div>
        <h1>Θεομήτωρ Bot</h1>
        <div class="sub">Χαρούμενο ρομπότ από τα παιδιά της Ομάδας Βουλής 🩷🌿</div>
      </div>
    </div>

    <div class="card">
      <div class="topbar">
        <div class="hint">Αποθηκεύω τη συζήτηση (μνήμη) μέσα στον browser σου.</div>
      </div>

      <div id="messages"></div>

      <div class="composer">
        <input id="input" placeholder="Γράψε εδώ…" autocomplete="off" />
        <button id="sendBtn">Αποστολή</button>
      </div>

      <div class="tools">
        <button class="smallbtn" id="clearBtn">Καθαρισμός μνήμης</button>
      </div>

      <div id="status">Έτοιμο.</div>
    </div>
  </div>

  <script>
    const API_URL = "https://my-ai-website-iota.vercel.app/api/chat";
    const STORAGE_KEY = "theomitor_chat_history_v1";

    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");
    const statusEl = document.getElementById("status");
    const clearBtn = document.getElementById("clearBtn");

    function escapeHtml(s) {
      return String(s).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;");
    }

    function formatTextForHtml(text) {
  // escape first
  let safe = escapeHtml(text);

  // turn URLs into clickable links (optional but nice)
  safe = safe.replace(
    /(https?:\/\/[^\s]+)/g,
    `<a href="$1" target="_blank" rel="noopener">$1</a>`
  );

  // convert newlines to <br>
  safe = safe.replaceAll("\n", "<br>");

  // make simple bullet points look nicer
  // lines starting with "- " or "• " will get a
      
    function loadHistory() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        const arr = raw ? JSON.parse(raw) : [];
        return Array.isArray(arr) ? arr : [];
      } catch { return []; }
    }

    function saveHistory(arr) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
    }

    // History format for backend: [{role:"user"|"assistant", content:"..."}]
    let history = loadHistory();

    function renderHistory() {
      messagesEl.innerHTML = "";
      for (const m of history) {
        if (m.role === "user") addMessageToUI("you", "Εσύ", m.content);
        if (m.role === "assistant") addMessageToUI("ai", "Θεομήτωρ Bot", m.content);
      }
      if (history.length === 0) {
        addMessageToUI("ai", "Θεομήτωρ Bot", "Γεια σου! 🤖🌸 Πώς μπορώ να βοηθήσω;");
      }
    }

    renderHistory();

    async function sendMessage() {
      const userMessage = inputEl.value.trim();
      if (!userMessage) return;

      // update local history + UI
      history.push({ role: "user", content: userMessage });
      saveHistory(history);
      addMessageToUI("you", "Εσύ", userMessage);

      inputEl.value = "";
      inputEl.focus();
      sendBtn.disabled = true;
      statusEl.textContent = "Σκέφτομαι...";

      // send only last 12 messages (memory window)
      const windowHistory = history.slice(-12);

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: userMessage, history: windowHistory })
        });

        const data = await response.json().catch(() => ({}));

        if (!response.ok) {
          addMessageToUI("err", "Σφάλμα", data.error || ("HTTP " + response.status));
          statusEl.textContent = "Κάτι πήγε στραβά.";
        } else {
          const reply = data.reply ?? "(χωρίς απάντηση)";
          history.push({ role: "assistant", content: reply });
          saveHistory(history);
          addMessageToUI("ai", "Θεομήτωρ Bot", reply);
          statusEl.textContent = "Έτοιμο.";
        }
      } catch (e) {
        addMessageToUI("err", "Σφάλμα", "Δε μπορώ να συνδεθώ στον server αυτή τη στιγμή.");
        statusEl.textContent = "Offline.";
      } finally {
        sendBtn.disabled = false;
      }
    }

    sendBtn.addEventListener("click", sendMessage);
    inputEl.addEventListener("keydown", (e) => { if (e.key === "Enter") sendMessage(); });

    clearBtn.addEventListener("click", () => {
      history = [];
      saveHistory(history);
      renderHistory();
      statusEl.textContent = "Η μνήμη καθαρίστηκε.";
    });

    // petals
    const scene = document.querySelector(".scene");
    for (let i = 0; i < 28; i++) {
      const p = document.createElement("div");
      p.className = "petal";
      p.style.left = (Math.random() * 100) + "vw";
      const dur = 6 + Math.random() * 8;
      p.style.animationDuration = dur + "s";
      p.style.animationDelay = (-Math.random() * dur) + "s";
      const size = 7 + Math.random() * 10;
      p.style.width = size + "px";
      p.style.height = (size * 0.8) + "px";
      p.style.opacity = (0.55 + Math.random() * 0.35).toFixed(2);
      scene.appendChild(p);
    }
  </script>
</body>
</html>
