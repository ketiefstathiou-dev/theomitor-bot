<!DOCTYPE html>
<html>
<head>
  <title>My AI</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }
    #chatbox {
      width: 90%;
      max-width: 600px;
      margin: auto;
      margin-top: 50px;
    }
    input {
      width: 80%;
      padding: 10px;
    }
    button {
      padding: 10px;
    }
  </style>
</head>
<body>

<h1>My AI</h1>

<div id="chatbox">
  <div id="messages"></div>
  <input id="input" placeholder="Say something..." />
  <button onclick="sendMessage()">Send</button>
</div>

<script>
async function sendMessage() {
  const input = document.getElementById("input");
  const messages = document.getElementById("messages");

  const userMessage = input.value;
  messages.innerHTML += "<p><b>You:</b> " + userMessage + "</p>";

  const response = await fetch("https://your-vercel-backend-url.vercel.app/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message: userMessage })
  });

  const data = await response.json();

  messages.innerHTML += "<p><b>AI:</b> " + data.reply + "</p>";
  input.value = "";
}
</script>

</body>
</html>
