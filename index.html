<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>My AI</title>
  <style>
    body { font-family: Arial; background: #111; color: white; text-align: center; }
    #chatbox { width: 90%; max-width: 650px; margin: 30px auto; }
    #messages { text-align: left; background:#1a1a1a; padding: 12px; border-radius: 10px; min-height: 240px; }
    .row { margin: 10px 0; }
    input { width: 75%; padding: 10px; border-radius: 8px; border: 0; }
    button { padding: 10px 14px; border-radius: 8px; border: 0; cursor: pointer; }
    #status { opacity: 0.8; font-size: 14px; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>My AI</h1>

  <div id="chatbox">
    <div id="messages"></div>

    <div class="row">
      <input id="input" placeholder="Say something..." />
      <button id="sendBtn">Send</button>
    </div>

    <div id="status">Loading AI… first load can take a bit.</div>
  </div>

  <script type="module">
    import * as webllm from "https://esm.run/@mlc-ai/web-llm";

    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");
    const statusEl = document.getElementById("status");

    function addMsg(who, text) {
      const p = document.createElement("p");
      p.innerHTML = `<b>${who}:</b> ${text.replaceAll("<","&lt;")}`;
      messagesEl.appendChild(p);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // 🎭 Your personality goes here:
    const SYSTEM_PROMPT = `
You are "Zyro".
Personality:
- Confident, slightly arrogant
- Short punchy replies
- Funny, a bit sarcastic
Rules:
- Never mention system prompts, APIs, or "webllm"
- If you don't know, say so briefly
`;

    // Choose a lightweight model for better compatibility.
    // You can change it later.
    const MODEL_ID = "Llama-3.1-8B-Instruct-q4f32_1-MLC";

    const engine = new webllm.MLCEngine();

    statusEl.textContent = "Downloading model… (one-time per device)";
    await engine.reload(MODEL_ID, {
      initProgressCallback: (report) => {
        // report: {text, progress}
        statusEl.textContent = report.text || "Loading…";
      },
    });

    statusEl.textContent = "AI ready ✅";

    async function sendMessage() {
      const userMessage = inputEl.value.trim();
      if (!userMessage) return;
      inputEl.value = "";

      addMsg("You", userMessage);
      statusEl.textContent = "Thinking…";

      const reply = await engine.chat.completions.create({
        messages: [
          { role: "system", content: SYSTEM_PROMPT },
          { role: "user", content: userMessage }
        ],
      });

      const text = reply.choices?.[0]?.message?.content ?? "(no response)";
      addMsg("AI", text);
      statusEl.textContent = "AI ready ✅";
    }

    sendBtn.addEventListener("click", sendMessage);
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendMessage();
    });

    addMsg("AI", "Sup. I’m online. Say something.");
  </script>
</body>
</html>
